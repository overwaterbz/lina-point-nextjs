name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - run: npm run lint

      - run: npm run test:ci

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          OPENAI_API_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: placeholder
          RESEND_API_KEY: placeholder
          GROK_API_KEY: placeholder
          TWILIO_ACCOUNT_SID: placeholder
          TWILIO_AUTH_TOKEN: placeholder
          TWILIO_WHATSAPP_FROM: placeholder
          SQUARE_ACCESS_TOKEN: placeholder
          SQUARE_LOCATION_ID: placeholder
          SQUARE_WEBHOOK_SECRET: placeholder
          N8N_WEBHOOK_URL: https://placeholder.n8n.cloud/webhook/placeholder
          N8N_WEBHOOK_SECRET: placeholder
          CRON_SECRET: placeholder
          SERPAPI_KEY: placeholder
          SENTRY_DSN: https://placeholder@placeholder.ingest.sentry.io/0
          ADMIN_EMAILS: admin@example.com

      - name: Lighthouse CI
        run: |
          npm i -g @lhci/cli@0.14.x
          lhci autorun --collect.staticDistDir=.next --collect.url=http://localhost:3000 || true
        continue-on-error: true
